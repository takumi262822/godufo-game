name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: godufo-game/package-lock.json

      - name: Install dependencies
        working-directory: godufo-game
        run: npm ci

      - name: Lint
        working-directory: godufo-game
        run: npm run lint

      - name: Test
        working-directory: godufo-game
        run: npm run test
