<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙大戦</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="game-wrap">
      <div id="title-screen">
        <div class="title-content">
          <h1 class="glitch-title" data-text="宇宙大戦">宇宙大戦</h1>
          <p class="subtitle">OVERDRIVE PROTOCOL</p>
          <div class="mission-info">
            <p>操作：[マウス/タッチ] 移動 ／ [クリック/タップ] 射撃</p>
            <p>必殺技：[X / スペース/タップ] グラビティノヴァ</p>
          </div>
          <button id="start-btn">ミッション開始</button>
        </div>
      </div>

      <div id="ui-layer">
        <div class="hud-top">
          <div class="stat-box"><span class="label">スコア</span><span id="score" class="value neon-blue">00000</span></div>
          <div class="stat-box"><span class="label">ウェーブ</span><span id="level" class="value neon-purple">01</span></div>
        </div>
        <div class="hud-bottom">
          <div class="shield-container"><div class="shield-bar"><div id="shield-fill"></div></div></div>
          <button id="special-btn">必殺技 発動！</button>
        </div>
      </div>
      <canvas id="gameCanvas"></canvas>
      <div id="crt-effect"></div>
    </div>
    <script type="module" src="./src/core/game-core.js"></script>
    <footer class="game-footer">&copy; <span data-current-year>2026</span> UFOGOD. All Rights Reserved.</footer>
</body>
</html>
